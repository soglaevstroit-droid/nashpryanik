name: Platform Checks

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - documentation

jobs:
  checks:
    name: Structure, Markdown, YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tooling
        run: npm ci

      - name: Check required structure
        run: ./scripts/check-structure.sh

      - name: Lint Markdown
        run: npm run lint:md

      - name: Validate YAML
        run: npm run lint:yaml
